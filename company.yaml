# company.yaml — Operator Context Values
#
# This file holds the actual values for one specific operator. The schema is in ENCODING.md.
# The boot sequence reads ENCODING.md to know the schema, then reads this file to load values,
# then computes profile completeness scores to determine which skills are unlocked.
#
# Recursive structure: agency-level fields + per-client subprofiles.
# Edit this file with the operator. Do not invent values. Empty fields refuse to unlock dependent skills.
#
# Version: 1.0.0 (template — operator fills in)

# ====================================================================
# PROFILE 1 — BUSINESS CONTEXT
# ====================================================================

business_context:
  basic_info:
    agency_name: ""                    # The operator's agency brand
    operator_name: ""                  # The agency owner / founder (private; never in client artifacts)
    website_url: ""
    industry_focus: ""                 # B2B Marketing | Lead Gen | Personal Brand | Vertical-specific
    business_model: ""                 # Hybrid (DFY + Program) | DFY-only | Program-only
    revenue_tier: ""                   # pre-revenue | $10K-$50K/mo | $50K-$250K/mo | $250K-$1M/mo | $1M+/mo
    years_active: 0
    team_size: 0

  positioning:
    mission_statement: ""              # One sentence. What this agency exists to do.
    vision_statement: ""               # One sentence. What world this agency is building toward.
    core_values: []                    # 4-6 values, specific
    unique_selling_proposition: ""     # The one-sentence USP
    competitive_advantages: []         # 5-7 specific advantages, each tied to evidence
    category_positioning: ""           # The category this agency owns

  market_position:
    target_markets: []
    customer_segments: []
    competitors:
      # Use methodology descriptors only, never real competitor names
      # - name_descriptor: "the volume-first DM agency"
      #   what_they_do: "..."
      #   how_we_differ: "..."

  partnerships_distribution:
    key_partnerships: []
    distribution_channels: []          # LinkedIn organic | YouTube | DM outreach | Referral | Speaking | Podcast
    referral_engine: ""

  operations:
    tech_stack:
      crm: ""                          # GoHighLevel | HubSpot | Close | Notion | Custom
      sales_navigator_tier: ""         # Free | Premium | Sales Navigator | Recruiter
      dm_automation: ""                # ManyChat | LinkedHelper | Heyreach | None
      booking: ""                      # Calendly | Savvycal | Cron
      client_communication: ""         # Slack | Loom | Voxer | WhatsApp
      content_scheduling: ""           # Taplio | Buffer | Native LinkedIn | Notion
      docs_sops: ""                    # Notion | Slite | Coda
      training_delivery: ""            # Loom | Skool | Circle | Custom
      payment: ""                      # Stripe | PayPal | Custom
      analytics: []
    team_structure:
      roles: []
      responsibilities: {}
      hiring_pipeline_status: ""

  health_signals:
    current_challenges: []             # 3-5 honest pressure points
    short_term_goals: []               # Next 90 days
    long_term_goals: []                # Next 12-24 months
    key_metrics:
      # - metric_name: "qualified_dm_replies_per_week"
      #   current_value: ""
      #   target_value: ""

  brand_assets:
    logo_descriptor: ""
    typography: ""
    color_palette: ""
    voice_guidelines_summary: ""

